services:
  - type: web
    name: api-key-manager
    runtime: node
    region: singapore
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/key-manager run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: api-key-manager-db
          property: connectionString

databases:
  - name: api-key-manager-db
    databaseName: apikeymanager
    plan: free
    region: singapore
