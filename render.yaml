services:
  - type: web
    name: yeulin-numbertoinfo
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm install -g pnpm@10.11.0 --prefix /tmp/pnpm-global && export PATH=\"/tmp/pnpm-global/bin:$PATH\" && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-spec exec orval --config ./orval.config.ts && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/key-manager run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yeulin-numbertoinfo-db
          property: connectionString

databases:
  - name: yeulin-numbertoinfo-db
    databaseName: yeulindb
    plan: free
    region: oregon
    version: "16"
