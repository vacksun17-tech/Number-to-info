services:
  - type: web
    name: yeulin-numbertoinfo
    runtime: node
    region: singapore
    plan: free
    buildCommand: "npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/key-manager run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yeulin-numbertoinfo-db
          property: connectionString

databases:
  - name: yeulin-numbertoinfo-db
    databaseName: yeulindb
    plan: free
    region: singapore
